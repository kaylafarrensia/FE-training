<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Login</title>
    <link rel="stylesheet" href="../styles/login.css" />
  </head>
  <body>
    <div class="wrapper">
      <h2>Login to your account</h2>
      <h5>Enter your credentials to login to your account</h5>

      <form id="loginForm">
        <div class="inputForm">
          <label for="email">Email</label>
          <input
            type="email"
            id="email"
            placeholder="johndoe@gmail.com"
            required
          />
          <span id="emailError" class="errorMsg"></span>
        </div>

        <div class="inputForm">
          <label for="password">Password</label>
          <input type="text" id="password" placeholder="*******" required />
          <span id="passwordError" class="errorMsg"></span>
        </div>
        <button type="submit" class="submitLogin">Log in</button>

        <h5>
          Don't have an account?
          <a class="regisPage" href="formRegister.html"> Create an account</a>
        </h5>
      </form>
    </div>

    <script type="module" src="./src/login.js"></script>
  </body>
</html>
