<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Register</title>
    <link rel="stylesheet" href="../styles/register.css" />
  </head>
  <body>
    <div class="wrapper">
      <h2>Create your account</h2>
      <h5>Let's get started with your 30 days free trial</h5>
      <form id="registerForm">
        <div class="inputForm">
          <label for="name">Name<span class="required">*</span></label>
          <input type="text" id="name" placeholder="johndoe" required />
          <span id="nameError" class="errorMsg"></span>
        </div>

        <div class="inputForm">
          <label for="email">Email<span class="required">*</span></label>
          <input
            type="email"
            id="email"
            placeholder="johndoe@gmail.com"
            required
          />
          <span id="emailError" class="errorMsg"></span>
        </div>

        <div class="inputForm">
          <label for="password">Password<span class="required">*</span></label>
          <input type="password" id="password" placeholder="*******" required />
          <span class="pwrequirement"
            >Password needs to have a minimal of 8 characters, 1 uppercase and 1
            symbol</span
          >
          <span id="passwordError" class="errorMsg"></span>
        </div>

        <div class="inputForm">
          <label for="retype"
            >Retype Password<span class="required">*</span></label
          >
          <input type="password" id="retype" placeholder="*******" required />
          <span id="retypeError" class="errorMsg"></span>
        </div>

        <div>
          <label class="terms">
            <input type="checkbox" id="termsnconditions" required />
            I agree to all terms, privacy policy and fees
          </label>
          <span id="termsnconditionsError" class="errorMsg"></span>
        </div>

        <button type="submit" class="submitRegis">Sign Up</button>

        <h5>
          Already have an account?
          <a class="loginPage" href="formLogin.html"> Log in</a>
        </h5>
      </form>
    </div>
    <script type="module" src="../src/main.js"></script>
  </body>
</html>
